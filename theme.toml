name = "Dougie"
license = "MIT"
licenselink = "https://github.com/doughatcher/dougie-theme/blob/main/LICENSE"
description = "Versatile micro.blog theme — microblog, publication, or one-page portfolio. Default + starfield variants. Configure per-site via plugin settings."
homepage = "https://github.com/doughatcher/dougie-theme"
tags = ["microblog", "minimal", "versatile", "configurable", "responsive", "publication", "portfolio", "multi-purpose"]
features = ["responsive", "rss", "json-feed", "micropost-detection", "social-media", "centered-layout", "archive", "photos", "configurable-layouts", "publication-mode", "one-page-mode"]
min_version = "0.91.0"

[author]
  name = "Doug Hatcher"
  homepage = "https://github.com/doughatcher"
  repo = "https://github.com/doughatcher/dougie-theme"

[original]
  author = "Micro.blog"
  homepage = "https://github.com/microdotblog/theme-blank"
  repo = "https://github.com/microdotblog/theme-blank"
