name: Deploy Dougie theme to all 3 sites

# Push to main (with theme-file changes) refreshes the Dougie theme on
# every micro.blog site that's installed it: superterran.net, leaning.blue,
# doughatcher.com. One auth, three reloads, monitored.
#
# Required repo secrets:
#   - GMAIL_APP_PASSWORD  Gmail app password for the polling-IMAP auth flow
# Required repo variables:
#   - GMAIL_EMAIL         Gmail address that receives the magic-link sign-in
#   - MICROBLOG_EMAIL     micro.blog account email (doug@hatcher.ltd)

on:
  push:
    branches: [main]
    paths:
      - 'layouts/**'
      - 'static/**'
      - 'theme.toml'
      - 'plugin.json'
      - 'screenshot.png'
      - '.github/workflows/deploy.yml'
      - '.github/deploy/**'
  workflow_dispatch:
    inputs:
      sites:
        description: 'Which sites to refresh (comma-separated theme IDs, blank = all 3)'
        required: false
        type: string
        default: ''

jobs:
  deploy:
    name: Refresh theme on all sites
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/deploy/requirements.txt'

      - name: Install dependencies
        run: pip install -r .github/deploy/requirements.txt

      - name: Generate cache key date prefix
        id: cache-key
        run: echo "date_prefix=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore session cookie from cache
        id: cache-session
        uses: actions/cache@v4
        with:
          path: .session-cookie
          key: microblog-session-${{ github.repository }}-${{ steps.cache-key.outputs.date_prefix }}
          restore-keys: |
            microblog-session-${{ github.repository }}-

      - name: Authenticate to Micro.blog (one-time, then reused across all 3 sites)
        if: steps.cache-session.outputs.cache-hit != 'true'
        env:
          GMAIL_EMAIL: ${{ vars.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MICROBLOG_EMAIL: ${{ vars.MICROBLOG_EMAIL }}
        run: |
          echo "::group::Authenticating (no cached session for today)"
          python3 .github/deploy/microblog_auth.py --output .session-cookie
          echo "::endgroup::"

      - name: Validate session cookie
        env:
          MICROBLOG_THEME_ID: '102558'
        run: |
          echo "::group::Validating session cookie"
          python3 .github/deploy/microblog_deploy.py --validate-only
          echo "::endgroup::"

      - name: Reload theme on each site
        id: deploy
        env:
          DEFAULT_THEMES: '102557 102551 102558'
          OVERRIDE_THEMES: ${{ inputs.sites }}
        run: |
          set +e  # don't bail on first failure — try all 3
          if [ -n "${OVERRIDE_THEMES}" ]; then
            THEMES=$(echo "${OVERRIDE_THEMES}" | tr ',' ' ')
            echo "Using override theme list: $THEMES"
          else
            THEMES="${DEFAULT_THEMES}"
            echo "Using default theme list (all 3 sites)"
          fi

          declare -A NAMES
          NAMES[102557]='superterran.net'
          NAMES[102551]='leaning.blue'
          NAMES[102558]='doughatcher.com'

          OVERALL=0
          RESULTS=()
          for tid in $THEMES; do
            name="${NAMES[$tid]:-(theme $tid)}"
            echo "::group::Refreshing $name (theme $tid)"
            MICROBLOG_THEME_ID="$tid" python3 .github/deploy/microblog_deploy.py --all --timeout 120
            rc=$?
            echo "::endgroup::"
            if [ $rc -eq 0 ]; then
              RESULTS+=("- ✅ ${name} (theme ${tid})")
            else
              RESULTS+=("- ❌ ${name} (theme ${tid}) — exit ${rc}")
              OVERALL=1
            fi
          done

          {
            echo "## Dougie theme refresh results"
            echo ""
            printf "%s\n" "${RESULTS[@]}"
            echo ""
            echo "Commit: \`${GITHUB_SHA::7}\` · Run: ${GITHUB_RUN_NUMBER}"
          } >> "$GITHUB_STEP_SUMMARY"

          exit $OVERALL
