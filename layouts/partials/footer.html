<footer class="site-footer">
    <div class="container">
        <!-- Mobile Profile (Avatar and Social Links) - Only visible on mobile -->
        <div class="mobile-profile">
            {{ if .Site.Params.avatar }}
            <img src="{{ .Site.Params.avatar }}" alt="{{ if .Site.Params.author.name }}{{ .Site.Params.author.name }}{{ else }}{{ .Site.Title }}{{ end }}" class="profile-avatar">
            {{ end }}
            
            <h2 class="mobile-profile-name">
                <a href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
            </h2>
            
            {{ partial "social-links.html" . }}
        </div>
        
        <!-- Publications for mobile - Only visible on mobile -->
        {{ if .Site.Params.show_publications_sidebar }}
        <div class="mobile-publications">
            {{ partial "publications-sidebar.html" . }}
        </div>
        {{ end }}
    </div>
</footer>
